<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación XV Andrea Carolina</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fuente elegante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
    


    <!-- Música -->
    <audio id="musica" loop>
        <source src="WhatsApp Audio 2026-06-13 at 2.18.10 PM.mpeg" type="audio/mpeg">
    </audio>

    <!-- Botón música -->
    <button id="btnMusica">🎵 Música</button>

    <div class="contenedor">

        <!-- Video principal -->
<video class="invitacion" autoplay muted loop playsinline preload="auto">
    <source src="invitacion.mp4" type="video/mp4">
    Tu navegador no soporta video HTML5.
</video>
        <!-- Nombre del invitado -->
        <div id="nombreInvitado" class="nombre-invitado">
            INVITADO
        </div>

        <!-- Cupos -->
        <div id="cuposInvitado" class="cupos">
            1 PERSONA(S)
        </div>
        

        <!-- Cuenta regresiva -->
        <div id="contador" class="contador"></div>

        <!-- Botones -->
        <div class="botones">

            <button id="btnWhatsapp">
                Confirmar Asistencia
            </button>

            <button id="btnUbicacion">
                Ver Ubicación
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
